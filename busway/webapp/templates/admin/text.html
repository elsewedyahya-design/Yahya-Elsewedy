{% extends "base.html" %}
{% block title %}Standard text · Admin · Busway{% endblock %}
{% block content %}
<h1>Standard text &amp; defaults</h1>

<p><a href="{{ url_for('admin_index') }}">&larr; Back to products</a></p>

<form method="post">
  <h2>Quote defaults</h2>
  <div class="grid">
    <div>
      <label>Default validity</label>
      <input type="text" name="validity"
             value="{{ st.get('defaults', {}).get('validity', '') }}"
             placeholder="e.g. 30 days">
    </div>
    <div>
      <label>Default warranty (months)</label>
      <input type="text" name="warranty_months"
             value="{{ st.get('defaults', {}).get('warranty_months', '') }}"
             placeholder="e.g. 18">
    </div>
  </div>

  <h2>Fixed technical notes</h2>
  <p class="muted">One note per line. These appear after the auto-composed Note 1
    in every offer.</p>
  <textarea name="notes">{{ st.get('technical_notes_fixed', []) | join('\n') }}</textarea>

  <div style="margin-top:18px">
    <button class="btn" type="submit">Save</button>
  </div>
</form>
{% endblock %}
